name: daily-signal
on:
  schedule:
    # 미국장 마감(16:00 ET) + 데이터 안정화 여유. 21:30 UTC (ET 16:30/17:30) — DST 무관하게 마감 후.
    - cron: "30 21 * * 1-5"
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # data.json 커밋용

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: pip install --quiet yfinance pandas numpy
      - name: compute
        run: python compute_data.py
      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "data: $(date -u +%Y-%m-%d) 목표비율 갱신"
            git push
          fi
